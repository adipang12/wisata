<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — WisataBandung</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#0f1f2d 0%,#17324d 50%,#1a3d52 100%);
}
.card{
  background:#fff;
  border-radius:20px;
  width:100%;
  max-width:400px;
  margin:1.5rem;
  box-shadow:0 24px 64px rgba(0,0,0,0.35);
  overflow:hidden;
}
.card-header{
  background:#17324d;
  padding:2rem 2rem 1.5rem;
  text-align:center;
}
.logo{
  font-family:'Playfair Display',serif;
  font-size:1.5rem;
  color:#fff;
}
.logo span{color:#f9d36a;font-style:italic;}
.card-sub{
  font-size:0.78rem;
  color:rgba(255,255,255,0.55);
  letter-spacing:1.5px;
  text-transform:uppercase;
  margin-top:0.35rem;
}
.card-body{padding:2rem;}
.card-title{
  font-family:'Playfair Display',serif;
  font-size:1.4rem;
  color:#17324d;
  margin-bottom:0.25rem;
}
.card-desc{font-size:0.82rem;color:rgba(30,37,32,0.5);margin-bottom:1.6rem;}
.field{margin-bottom:1rem;}
.field label{
  display:block;
  font-size:0.8rem;
  font-weight:700;
  color:#1E2520;
  margin-bottom:5px;
}
.field input{
  width:100%;
  padding:0.7rem 0.9rem;
  border:1.5px solid rgba(23,50,77,0.2);
  border-radius:8px;
  font-size:0.9rem;
  font-family:'DM Sans',sans-serif;
  outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.field input:focus{
  border-color:#17324d;
  box-shadow:0 0 0 3px rgba(23,50,77,0.1);
}
.submit-btn{
  width:100%;
  padding:0.88rem;
  background:#17324d;
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:0.92rem;
  font-weight:700;
  cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:background 0.2s,transform 0.15s;
  margin-top:0.4rem;
}
.submit-btn:hover{background:#1a3d52;transform:translateY(-1px);}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.err-msg{
  display:none;
  background:#fff1f1;
  color:#9b1c1c;
  border:1px solid #f5b8b8;
  border-radius:8px;
  font-size:0.82rem;
  padding:0.65rem 0.85rem;
  margin-top:1rem;
}
.back-link{
  text-align:center;
  font-size:0.82rem;
  color:rgba(30,37,32,0.5);
  margin-top:1.2rem;
}
.back-link a{color:#17324d;font-weight:700;text-decoration:none;}
.back-link a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="logo">Wisata<span>Bandung</span></div>
    <div class="card-sub">Panel Administrator</div>
  </div>
  <div class="card-body">
    <div class="card-title">Masuk sebagai Admin</div>
    <div class="card-desc">Kelola destinasi wisata Bandung</div>

    <form id="login-form">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required placeholder="Masukkan username" autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Masukkan password" autocomplete="current-password">
      </div>
      <button type="submit" class="submit-btn" id="submit-btn">Masuk</button>
      <div class="err-msg" id="err-msg"></div>
    </form>

    <div class="back-link">
      Kembali ke <a href="../index.html">Peta Wisata</a>
    </div>
  </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value;
  var errEl    = document.getElementById('err-msg');
  var btnEl    = document.getElementById('submit-btn');

  errEl.style.display = 'none';
  btnEl.disabled = true;
  btnEl.textContent = 'Memverifikasi...';

  try {
    var res  = await fetch('auth.php', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ action: 'login', username: username, password: password })
    });
    var data = await res.json();

    if (data.success) {
      btnEl.textContent = 'Berhasil! Mengalihkan...';
      window.location.href = 'index.html';
    } else {
      errEl.textContent    = data.message || 'Login gagal';
      errEl.style.display  = 'block';
      btnEl.disabled       = false;
      btnEl.textContent    = 'Masuk';
    }
  } catch (err) {
    errEl.textContent   = 'Terjadi kesalahan, coba lagi.';
    errEl.style.display = 'block';
    btnEl.disabled      = false;
    btnEl.textContent   = 'Masuk';
  }
});
</script>
</body>
</html>
